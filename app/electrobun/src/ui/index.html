<!--
  NOTE: In Electrobun the build.copy config in electrobun.config.ts
  copies app files into the views/ui/ output folder at build time.
  All paths below resolve correctly after build.
  For dev mode (electrobun dev), files are served from this directory.
-->
<link rel="stylesheet" href="app.css">
</head>
<body>
<script src="channels.js"></script>
<script src="nostr.js"></script>
<!-- noble-post-quantum loaded from esm.sh in app.js -->
<!-- openpgp.min.js loaded if present -->
<script>
  // Load openpgp if available (place openpgp.min.js next to this file)
  (function() {
    var s = document.createElement('script');
    s.src = 'openpgp.min.js';
    s.onerror = function() { console.log('[CIPHER//NET] openpgp.min.js not found — PGP features disabled'); };
    document.head.appendChild(s);
  })();
</script>
<script src="app.js"></script>
</body>
